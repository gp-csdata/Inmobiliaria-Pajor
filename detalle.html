<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle de Propiedad | Inmobiliaria Pajor</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/components.css">

<link rel="icon" href="img/ico2.png" type="image/png">

<script src="https://unpkg.com/lucide@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#f5f5f5;
overflow-x:hidden;
}

html,body{
scroll-behavior:smooth;
}

/* ================= HEADER ================= */

header{

background:white;
padding:10px 50px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:1px solid #eee;

position:sticky;
top:0;
z-index:999;
}

.logo-container{
display:flex;
align-items:center;
cursor:pointer;
}

.logo-container img{
height:80px;
width:auto;
transition:.3s;
}

.logo-container img:hover{
transform:scale(1.03);
}

nav{
display:flex;
gap:25px;
}

nav a{
text-decoration:none;
color:var(--color-gris);
font-size:14px;
transition:.3s;
}

nav a:hover{
color:var(--color-principal);
}

.active-link{
color:var(--color-principal);
font-weight:bold;
}

/* ================= DETALLE ================= */

.detail-wrapper{
max-width:1350px;
margin:30px auto;
padding:0 20px;
display:grid;
grid-template-columns:minmax(0,1fr) 320px;
gap:30px;
width:100%;
}

.main-info-box,
.side-info-box{
background:var(--color-blanco);
border-radius:12px;
padding:25px;
box-shadow:var(--shadow-card);
min-width:0;
overflow:hidden;
}

.side-info-box{
align-self:start;
position:sticky;
top:100px;
}

/* ================= GALERIA ================= */

.media-container{
position:relative;
}

.gallery-main{
width:100%;
height:65vh;
max-height:700px;
object-fit:contain;
background:#f5f5f5;
border-radius:8px;
}

#media-principal img,
#media-principal video{
width:100%;
height:65vh;
max-height:700px;
object-fit:contain;
background:#f5f5f5;
border-radius:8px;
}

.gallery-arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
width:50px;
height:50px;
border:none;
border-radius:50%;
background:rgba(255,255,255,.9);
cursor:pointer;
font-size:28px;
font-weight:bold;
z-index:10;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.arrow-left{
left:15px;
}

.arrow-right{
right:15px;
}

.gallery-thumbnails{
display:flex;
gap:10px;
margin-top:15px;
width:100%;
max-width:100%;
overflow-x:auto;
overflow-y:hidden;
flex-wrap:nowrap;
padding-bottom:8px;
scrollbar-width:none;
}

.gallery-thumbnails::-webkit-scrollbar{
display:none;
}

.thumb-img,
.thumb-video{
flex:0 0 70px;
width:70px;
height:55px;
border-radius:4px;
cursor:pointer;
border:2px solid transparent;
transition:.3s;
}

.thumb-img{
object-fit:cover;
}

.thumb-video{
display:flex;
justify-content:center;
align-items:center;
background:#222;
color:white;
font-size:12px;
font-weight:bold;
}

.thumb-img:hover,
.thumb-img.active,
.thumb-video:hover,
.thumb-video.active{
border-color:var(--color-principal);
transform:scale(1.03);
}

.header-section{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-top:20px;
border-bottom:1px solid #eee;
padding-bottom:20px;
}

.tech-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin:20px 0;
background:var(--color-fondo);
padding:15px;
border-radius:8px;
}

.tech-item{
text-align:center;
font-size:16px;
}

.tech-item b{
display:block;
font-size:18px;
margin-top:5px;
}

.tech-item span{
display:block;
font-size:14px;
color:#777;
margin-top:4px;
}

.features-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:20px;
padding:15px;
background:#fafafa;
border-radius:8px;
border:1px solid #eee;
}

.feature-item{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
padding:10px;
font-size:14px;
font-weight:600;
background:white;
border-radius:6px;
}

.feature-item i{
width:18px;
height:18px;
color:#1fa84b;
}

.btn-action{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:100%;
padding:14px;
border-radius:6px;
font-weight:bold;
text-decoration:none;
margin-top:15px;
transition:.3s;
}

.btn-action-whatsapp{
background:#25D366;
color:white;
}

.media-container{
position:relative;
width:100%;
overflow:hidden;
}

@media(max-width:768px){

header{
padding:20px;
flex-direction:column;
gap:15px;
}

nav{
flex-wrap:wrap;
justify-content:center;
}

.detail-wrapper{
grid-template-columns:1fr;
}

.tech-grid{
grid-template-columns:repeat(2,1fr);
}

.features-grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<header>

<div class="logo-container"
onclick="window.location.href='index.html'">

<img src="img/logo-cuad.png">

</div>

<nav>

<a href="index.html">Inicio</a>

<a href="propiedades.html" class="active-link">
Propiedades
</a>

<a href="tasaciones.html">Tasaciones</a>
<a href="consorcios.html">Consorcios</a>
<a href="nosotros.html">Nosotros</a>
<a href="contacto.html">Contacto</a>

</nav>

</header>


<div class="detail-wrapper">

<main class="main-info-box">

<div class="media-container">

<button class="gallery-arrow arrow-left"
onclick="anteriorMedia()">‹</button>

<div id="media-principal"></div>

<button class="gallery-arrow arrow-right"
onclick="siguienteMedia()">›</button>

</div>

<div id="prop-galeria"
class="gallery-thumbnails"></div>

<div class="header-section">

<div>

<span id="prop-operacion"
class="prop-tag">-</span>

<h1 id="prop-titulo"
style="font-size:26px;color:var(--color-gris);margin-top:10px;">
Cargando título...
</h1>

<p id="prop-ubicacion"
style="font-size:16px;color:#666;margin-top:5px;">
<i data-lucide="map-pin"></i>
</p>

</div>

<div style="text-align:right;">
<span style="font-size:14px;color:#999;">
Código de Ref.
</span>
<br>
<span id="prop-codigo"></span>
</div>

</div>

<div class="tech-grid">

<div class="tech-item">
<i data-lucide="bed"></i>
<b id="prop-dorm">0</b>
<span>Dormitorios</span>
</div>

<div class="tech-item">
<i data-lucide="bath"></i>
<b id="prop-baños">0</b>
<span>Baños</span>
</div>

<div class="tech-item">
<i data-lucide="maximize-2"></i>
<b id="prop-suptotal">-</b>
<span>Sup.Total</span>
</div>

<div class="tech-item">
<i data-lucide="layers"></i>
<b id="prop-supcub">-</b>
<span>Sup.Cubierta</span>
</div>

</div>

<div id="features-grid" class="features-grid"></div>

<h2 style="margin-top:25px;font-size:24px;">
Descripción de la propiedad
</h2>

<p id="prop-descripcion"
style="font-size:18px;line-height:1.8;color:#444;">
</p>

</main>

<aside class="side-info-box">
<span>Valor de la propiedad</span>
<h2 id="prop-precio"></h2>

<h4 style="margin-top:20px;">
¿Te interesa esta propiedad?
</h4>

<a id="link-wsp"
href="#"
target="_blank"
class="btn-action btn-action-whatsapp">

<i data-lucide="message-circle"></i>
Consultar por WhatsApp

</a>

</aside>

</div>

<script>

let fotos=[];
let indiceActual=0;

function siguienteMedia(){

indiceActual=(indiceActual+1)%fotos.length;
cargarMedia(fotos[indiceActual]);

}

function anteriorMedia(){

indiceActual--;

if(indiceActual<0){

indiceActual=fotos.length-1;

}

cargarMedia(fotos[indiceActual]);

}

async function cargarDetalle(){

const params=new URLSearchParams(window.location.search);
const id=params.get('id');

const response=await fetch('./data/propiedades.json');
const propiedades=await response.json();

const prop=propiedades.find(p=>p.id==id);

if(!prop)return;

fotos=prop.imagenes || [];

const mediaPrincipal=
document.getElementById('media-principal');

function cargarMedia(ruta){

const extension=
ruta.split('.').pop().toLowerCase();

if(extension==="mp4"){

mediaPrincipal.innerHTML=
`<video controls class="gallery-main">
<source src="${ruta}">
</video>`;

}else{

mediaPrincipal.innerHTML=
`<img src="${ruta}" class="gallery-main">`;

}

}

window.cargarMedia=cargarMedia;
if(fotos.length){
const galeria=
document.getElementById('prop-galeria');
galeria.innerHTML='';
cargarMedia(fotos[0]);
fotos.forEach((ruta,index)=>{
let thumb;
if(ruta.includes(".mp4")){
thumb=document.createElement("div");
thumb.className=
`thumb-video ${index===0?'active':''}`;
thumb.innerHTML='▶ VIDEO';
}else{

thumb=document.createElement("img");
thumb.src=ruta;
thumb.className=
`thumb-img ${index===0?'active':''}`;
}

thumb.onclick=()=>{
indiceActual=index;
document
.querySelectorAll(
'.thumb-img,.thumb-video'
)
.forEach(t=>
t.classList.remove('active')
);
thumb.classList.add('active');
cargarMedia(ruta);
};
galeria.appendChild(thumb);
});
}

document.getElementById('prop-titulo').innerText=prop.titulo;
document.getElementById('prop-operacion').innerText=prop.operacion;
document.getElementById('prop-ubicacion').innerHTML=`<i data-lucide="map-pin"></i> ${prop.ubicacion}`;
document.getElementById('prop-codigo').innerText=prop.codigo;
document.getElementById('prop-precio').innerText=prop.precio;

document.getElementById('prop-dorm').innerText=prop.dormitorios||"-";
document.getElementById('prop-baños').innerText=prop.baños||"-";
document.getElementById('prop-suptotal').innerText=prop.sup_total||"-";
document.getElementById('prop-supcub').innerText=prop.sup_cubierta||"-";

document.getElementById('prop-descripcion').innerText=
prop.descripcion || "Sin descripción";

/* ===== ESTADO DISPONIBLE / ALQUILADA ===== */

const boton=
document.getElementById("link-wsp");

if(prop.estado==="alquilada"){

boton.innerHTML=`
<i data-lucide="x-circle"></i>
No disponible
`;
boton.removeAttribute("href");
boton.style.background="#7a7a7a";
boton.style.cursor="not-allowed";
boton.style.pointerEvents="none";
}else{

const msg = encodeURIComponent(
`Hola, quisiera recibir información sobre la siguiente propiedad:
Código: ${prop.codigo}
Título: ${prop.titulo}
Ubicación: ${prop.ubicacion}`
);

boton.href=
`https://wa.me/543364599037?text=${msg}`;
}

/* ===== CARACTERÍSTICAS TRUE ===== */

const features=
document.getElementById("features-grid");

features.innerHTML='';

Object.entries(prop).forEach(([clave,valor])=>{

if(valor===true){

const nombre=clave
.replaceAll("_"," ")
.replace(/\b\w/g,l=>l.toUpperCase());

features.innerHTML+=`
<div class="feature-item">
<i data-lucide="check-circle"></i>
<span>${nombre}</span>
</div>
`;
}
});
lucide.createIcons();
}
window.onload=cargarDetalle;
</script>
</body>
</html>
